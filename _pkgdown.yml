# ==============================================================================
# Function Reference Organization
# ==============================================================================

reference:
- title: "Authentication"
  desc: >
    Connect to the UK Biobank Research Analysis Platform (RAP) and
    manage project selection.
  contents:
  - starts_with("auth_")

- title: "Fetch — RAP File System"
  desc: >
    Explore and retrieve files from RAP project storage.
  contents:
  - fetch_ls
  - fetch_tree
  - fetch_url
  - fetch_file
  - fetch_metadata
  - fetch_field

- title: "Extract — Phenotype Data"
  desc: >
    Extract UKB fields from the RAP dataset into R.
  contents:
  - extract_ls
  - extract_pheno
  - starts_with("extract_batch")

- title: "Decode — Column Names and Values"
  desc: >
    Convert raw UKB column names and coded values to human-readable labels.
  contents:
  - decode_names
  - decode_values

- title: "Derive — Disease Phenotypes"
  desc: >
    Build case definitions from HES, cancer registry, self-report,
    and First Occurrence data sources.
  contents:
  - derive_selfreport
  - derive_hes
  - derive_cancer_registry
  - derive_death_registry
  - derive_first_occurrence
  - derive_icd10
  - derive_case

- title: "Derive — Covariates and Timing"
  desc: >
    Derive continuous covariates, categorical cuts, follow-up time,
    and event timing variables.
  contents:
  - derive_covariate
  - derive_cut
  - derive_missing
  - derive_age
  - derive_followup
  - derive_timing

- title: "Jobs — Monitoring and Retrieval"
  desc: >
    Submit, monitor, and retrieve results from RAP extraction jobs.
  contents:
  - starts_with("job_")

- title: "Association Analysis"
  desc: >
    Fit regression models for UKB outcomes with automatic three-model
    adjustment framework.
  contents:
  - assoc_coxph
  - assoc_cox
  - assoc_logistic
  - assoc_logit
  - assoc_linear
  - assoc_lm
  - assoc_coxph_zph
  - assoc_zph
  - assoc_subgroup
  - assoc_sub
  - assoc_trend
  - assoc_tr
  - assoc_competing
  - assoc_fg
  - assoc_lag

- title: "GRS — Genetic Risk Scores"
  desc: >
    End-to-end RAP-native pipeline for computing and validating
    polygenic risk scores with plink2.
  contents:
  - grs_check
  - grs_bgen2pgen
  - grs_score
  - grs_standardize
  - grs_zscore
  - grs_validate

- title: "Visualisation"
  desc: >
    Publication-quality forest plots and Table 1 for manuscripts.
  contents:
  - plot_forest
  - plot_tableone

